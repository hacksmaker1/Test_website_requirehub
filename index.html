<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Require Hub v6 — Custom Roblox Executor</title>
    <style>
        /* =========================================================================
           1. CORE CONFIGURATIONS & BLACK-AND-BLUE THEME ENGINE
           ========================================================================= */
        :root {
            --bg-dark-primary: #020204;       /* Deep obsidian black */
            --bg-dark-secondary: #05070f;     /* Midnight blue undertone */
            --bg-glass-panel: rgba(6, 8, 14, 0.85); /* Smooth translucent dark blue-black */
            --bg-editor-canvas: #010205;      /* True black for high code contrast */
            --border-glow-cyan: rgba(0, 168, 255, 0.25); /* Vibrant blue border aura */
            --accent-cyan: #00a8ff;           /* Electric blue */
            --accent-cyan-hover: #3faeff;     /* Radiant blue highlight */
            --accent-green: #00ff88;
            --accent-green-hover: #00cc6e;
            --accent-red: #ff4757;
            --accent-yellow: #ffa502;
            --text-pure-white: #ffffff;
            --text-muted-gray: #5f7590;       /* Slate blue-gray for secondary elements */
            --font-stack-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            --font-stack-code: 'Consolas', 'Fira Code', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack-main);
            user-select: none;
            -webkit-user-drag: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark-primary);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =========================================================================
           2. INTERACTIVE PARTICLES INTERPOLATION BACKGROUND ENGINE
           ========================================================================= */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-vignette {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, rgba(0, 85, 255, 0.08) 0%, rgba(2, 2, 4, 0.98) 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* =========================================================================
           3. EXPANDED APPLICATION MAIN WRAPPER WINDOW FRAME
           ========================================================================= */
        .app-window-shell {
            position: relative;
            z-index: 10;
            background: var(--bg-glass-panel);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(0, 168, 255, 0.15); 
            border-radius: 14px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.95), 0 0 70px rgba(0, 168, 255, 0.06);
            color: var(--text-pure-white);
            overflow: hidden;
            
            /* Big Premium Scale Footprint */
            width: 1100px;  
            height: 680px;  
            
            display: flex;
            flex-direction: column;
            transform: scale(1);
            opacity: 1;
            transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Top Action Bar Component */
        .window-topbar-container {
            background: rgba(4, 5, 10, 0.95);
            padding: 18px 26px;
            border-bottom: 1px solid rgba(0, 168, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar-identity-cluster {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-transform: uppercase;
        }

        .topbar-identity-cluster img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0, 168, 255, 0.5);
            object-fit: cover;
        }

        .topbar-window-controls {
            display: flex;
            gap: 10px;
        }

        .window-control-circle {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }
        .window-control-circle:hover { 
            opacity: 0.8; 
            transform: scale(1.15);
        }
        .window-control-circle.close-proc { background: var(--accent-red); }
        .window-control-circle.min-proc { background: var(--accent-yellow); }
        .window-control-circle.max-proc { background: #27c93f; }

        /* =========================================================================
           4. STAGE VIEWPORT 1: SECURE AUTHENTICATION SYSTEM
           ========================================================================= */
        .auth-viewport-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 60px;
            text-align: center;
        }

        .auth-branding-logo {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            margin-bottom: 28px;
            box-shadow: 0 0 35px rgba(0, 168, 255, 0.35);
            object-fit: cover;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-viewport-wrapper h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .auth-viewport-subtext {
            font-size: 0.9rem;
            color: var(--text-muted-gray);
            margin-bottom: 36px;
        }

        .auth-form-engine-module {
            width: 100%;
            max-width: 380px;
        }

        .form-input-node {
            width: 100%;
            padding: 14px 20px;
            background: rgba(1, 2, 5, 0.7);
            border: 1px solid rgba(0, 168, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input-node:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 168, 255, 0.02);
            box-shadow: 0 0 14px rgba(0, 168, 255, 0.25);
        }

        .form-submit-trigger-node {
            width: 100%;
            padding: 14px;
            background: var(--accent-cyan);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
        }

        .form-submit-trigger-node:hover {
            background: var(--accent-cyan-hover);
            box-shadow: 0 0 25px rgba(0, 168, 255, 0.45);
        }
        
        .form-submit-trigger-node:active {
            transform: scale(0.98);
        }

        .form-interactive-toggle-footer {
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-muted-gray);
        }

        .form-interactive-toggle-footer span {
            color: var(--accent-cyan);
            cursor: pointer;
            font-weight: 600;
        }
        .form-interactive-toggle-footer span:hover { text-decoration: underline; }

        /* =========================================================================
           5. STAGE VIEWPORT 2: SINGLE FULL-WIDTH ROBLOX EXECUTOR WORKSPACE
           ========================================================================= */
        .runtime-viewport-wrapper {
            display: none; 
            flex-grow: 1;
            height: calc(100% - 65px);
        }

        .workspace-terminal-panel {
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #010204;
        }

        .workspace-editor-canvas-box {
            flex-grow: 1;
            background: var(--bg-editor-canvas);
            border: 1px solid rgba(0, 168, 255, 0.08);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            gap: 18px;
            overflow: hidden;
            position: relative;
        }

        .editor-line-number-gutter {
            text-align: right;
            font-family: var(--font-stack-code);
            font-size: 1.05rem; 
            color: #1e2d42;     
            line-height: 1.6;
            user-select: none;
        }

        .editor-code-processing-stream-area {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent-cyan);
            font-family: var(--font-stack-code);
            font-size: 1.05rem; 
            resize: none;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
            overflow-y: auto;
        }

        /* Workspace Footer Operational Layout Controls */
        .workspace-operations-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .operations-action-cluster-nodes {
            display: flex;
            gap: 14px;
        }

        .operation-execution-button {
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid rgba(0, 168, 255, 0.2);
            background: rgba(255, 255, 255, 0.01);
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .operation-execution-button:hover {
            background: rgba(0, 168, 255, 0.05);
            border-color: rgba(0, 168, 255, 0.35);
        }

        .operation-execution-button.primary-payload-fire {
            background: var(--accent-cyan);
            color: #ffffff;
            border: none;
        }

        .operation-execution-button.primary-payload-fire:hover {
            background: var(--accent-cyan-hover);
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.45);
        }

        .operation-execution-button.kill-switch-action {
            border-color: rgba(255, 71, 87, 0.3);
            color: var(--accent-red);
        }

        .operation-execution-button.kill-switch-action:hover {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--accent-red);
        }

        .telemetry-stream-pipeline-status-text {
            font-size: 0.8rem;
            color: var(--text-muted-gray);
            font-family: var(--font-stack-code);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .telemetry-stream-pipeline-status-text span {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        /* ENGINE ACCESSIBILITY HELPERS */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- CORE INTERPOLATIVE GEOMETRIC BACKGROUND GRID CANVAS -->
    <canvas id="bgCanvas"></canvas>
    <div class="ambient-vignette"></div>

    <!-- MAIN SYSTEM CORE INTERACTION WINDOW WRAPPER -->
    <div class="app-window-shell" id="appRootWindowFrameBox">
        
        <!-- FRAME CONTROLLER HEADER DESKTOP BAR -->
        <div class="window-topbar-container">
            <div class="topbar-identity-cluster">
                <img src="https://via.placeholder.com/50/00a8ff/ffffff?text=RH" alt="Require Hub Identity Hub Logo" id="windowGlobalProfileLogo">
                <span id="windowDisplayDynamicTitle">Require Hub v6 // Connection Portal</span>
            </div>
            <div class="topbar-window-controls">
                <div class="window-control-circle close-proc" onclick="closeApplicationContextFrame()" title="Terminate Engine Process Core"></div>
                <div class="window-control-circle min-proc" onclick="minimizeApplicationContextFrame()" title="Suspend Allocations Frame"></div>
                <div class="window-control-circle max-proc" onclick="maximizeApplicationContextFrame()" title="Optimize Memory View Boundaries"></div>
            </div>
        </div>

        <!-- STAGE PORTAL VIEWPORT 1: SECURE ACCREDITATION VERIFICATION (SIGN / LOGIN) -->
        <div class="auth-viewport-wrapper" id="authGatewayStructuralWrapper">
            <img src="https://via.placeholder.com/150/00a8ff/ffffff?text=V6" class="auth-branding-logo" alt="Branding Interface Dynamic Core Loader" id="formBrandingDynamicLogo">
            <h2 id="authGatewayMainHeadingTitleText">Security Clearance Required</h2>
            <p class="auth-viewport-subtext" id="authGatewaySubHeadingText">Establish link sequence to initialization node pipeline.</p>
            
            <form class="auth-form-engine-module" onsubmit="handleAuthenticationGatewayFormProcessing(event)">
                <input type="text" id="formFieldIdentityUsernameNode" class="form-input-node hidden" placeholder="Construct Unique Core Profile HandleID">
                <input type="email" id="formFieldIdentityEmailNode" class="form-input-node" placeholder="System Registry Identifier Email" required>
                <input type="password" id="formFieldIdentityPasswordNode" class="form-input-node" placeholder="Security Access Encryption Token" required>
                
                <button type="submit" class="form-submit-trigger-node" id="formSubmitActionTriggerButton">Authorize Gateway Interface</button>
            </form>

            <div class="form-interactive-toggle-footer" id="formActionToggleViewFooterWrapper">
                New instance pipeline structure? <span onclick="switchAuthenticationGatewayViewMode()">Provision Account Profile</span>
            </div>
        </div>

        <!-- STAGE PORTAL VIEWPORT 2: PRODUCTION REAL RUNTIME DESKTOP COMPILATION WORKSPACE -->
        <div class="runtime-viewport-wrapper" id="runtimeWorkspaceStructuralWrapper">
            
            <!-- EXECUTOR WORKSPACE DISPLAY TERMINAL PANEL (FULL WIDTH) -->
            <div class="workspace-terminal-panel" id="workspaceEditorAreaViewWrapper">
                <div class="workspace-editor-canvas-box">
                    <!-- Line-Numbers Column Tracking Index Gutter -->
                    <div class="editor-line-number-gutter" id="editorLineCounterCanvasGutter">1<br>2<br>3<br>4<br>5</div>
                    
                    <!-- Text Area Processing Stream Vector Area Block -->
                    <textarea id="workspaceCodeTextAreaStreamSource" spellcheck="false" oninput="executeEditorCanvasLineNumbersRecalculation()">-- Require Hub v6 Official Roblox Executor Script Playground&#10;print("Executor Environment Loaded Successfully.")&#10;local Player = game:GetService("Players").LocalPlayer&#10;&#10;-- Paste or write your custom Roblox scripts below...</textarea>
                </div>

                <!-- Lower Function Buttons Operations Area Console Bar -->
                <div class="workspace-operations-row">
                    <div class="operations-action-cluster-nodes">
                        <button class="operation-execution-button primary-payload-fire" onclick="fireCompiledScriptPayloadStream()">Execute</button>
                        <button class="operation-execution-button" onclick="flushWorkspaceEditorTextAreaStream()">Clear Canvas</button>
                        <button class="operation-execution-button" onclick="attachToRobloxInstancePipeline()">Attach / Inject</button>
                        <button class="operation-execution-button kill-switch-action" onclick="disconnectSystemRuntimePipelineEngine()">Logout</button>
                    </div>
                    <div class="telemetry-stream-pipeline-status-text">Engine Connection State: <span id="telemetryDataStatusFeedbackStringLabel">Ready to Attach</span></div>
                </div>
            </div>

        </div>

    </div>

    <!-- =========================================================================
       6. CORE JAVASCRIPT PROGRAMMATIC ARCHITECTURE OPERATIONS ENGINES PIPELINES
       ========================================================================= -->
    <script>
        /* =========================================================================
           OPERATIONS SECTOR A: MATHEMATICAL PROXEMIC PARTICLE NETWORK BACKGROUND
           ========================================================================= */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let layoutWidthVector = canvas.width = window.innerWidth;
        let layoutHeightVector = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            layoutWidthVector = canvas.width = window.innerWidth;
            layoutHeightVector = canvas.height = window.innerHeight;
        });

        const activeCoordinatesNodeCluster = [];
        const networkCalculationDensityLimit = 125;

        for (let idx = 0; idx < networkCalculationDensityLimit; idx++) {
            activeCoordinatesNodeCluster.push({
                spatialX: Math.random() * layoutWidthVector,
                spatialY: Math.random() * layoutHeightVector,
                speedX: (Math.random() - 0.5) * 1.4,
                speedY: (Math.random() - 0.5) * 1.4,
                coordinateRadius: Math.random() * 2 + 1
            });
        }

        function systemBackgroundGraphicFrameLoopEngine() {
            ctx.clearRect(0, 0, layoutWidthVector, layoutHeightVector);
            ctx.fillStyle = "rgba(0, 168, 255, 0.4)";

            for (let cursorIdx = 0; cursorIdx < activeCoordinatesNodeCluster.length; cursorIdx++) {
                let movingNode = activeCoordinatesNodeCluster[cursorIdx];
                movingNode.spatialX += movingNode.speedX;
                movingNode.spatialY += movingNode.speedY;

                if (movingNode.spatialX < 0 || movingNode.spatialX > layoutWidthVector) movingNode.speedX *= -1;
                if (movingNode.spatialY < 0 || movingNode.spatialY > layoutHeightVector) movingNode.speedY *= -1;

                ctx.beginPath();
                ctx.arc(movingNode.spatialX, movingNode.spatialY, movingNode.coordinateRadius, 0, Math.PI * 2);
                ctx.fill();

                for (let relationalCursorIdx = cursorIdx + 1; relationalCursorIdx < activeCoordinatesNodeCluster.length; relationalCursorIdx++) {
                    let benchmarkNode = activeCoordinatesNodeCluster[relationalCursorIdx];
                    let absoluteDistanceHypot = Math.hypot(movingNode.spatialX - benchmarkNode.spatialX, movingNode.spatialY - benchmarkNode.spatialY);

                    if (absoluteDistanceHypot < 140) {
                        ctx.strokeStyle = `rgba(0, 140, 255, ${1 - (absoluteDistanceHypot / 140) * 0.95})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(movingNode.spatialX, movingNode.spatialY);
                        ctx.lineTo(benchmarkNode.spatialX, benchmarkNode.spatialY);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(systemBackgroundGraphicFrameLoopEngine);
        }
        systemBackgroundGraphicFrameLoopEngine();

        /* =========================================================================
           OPERATIONS SECTOR B: AUTHENTICATION INTERACTION CONTROLLERS SWITCH HOOKS
           ========================================================================= */
        let stateViewGatewayRegistrationActiveMode = false;
        let isAttachedToRobloxInstanceEngine = false;

        const authGatewayStructuralWrapper = document.getElementById('authGatewayStructuralWrapper');
        const runtimeWorkspaceStructuralWrapper = document.getElementById('runtimeWorkspaceStructuralWrapper');
        const appRootWindowFrameBox = document.getElementById('appRootWindowFrameBox');
        const formFieldIdentityUsernameNode = document.getElementById('formFieldIdentityUsernameNode');
        const authGatewayMainHeadingTitleText = document.getElementById('authGatewayMainHeadingTitleText');
        const authGatewaySubHeadingText = document.getElementById('authGatewaySubHeadingText');
        const formSubmitActionTriggerButton = document.getElementById('formSubmitActionTriggerButton');
        const formActionToggleViewFooterWrapper = document.getElementById('formActionToggleViewFooterWrapper');
        const windowDisplayDynamicTitle = document.getElementById('windowDisplayDynamicTitle');
        const workspaceCodeTextAreaStreamSource = document.getElementById('workspaceCodeTextAreaStreamSource');
        const editorLineCounterCanvasGutter = document.getElementById('editorLineCounterCanvasGutter');
        const formBrandingDynamicLogo = document.getElementById('formBrandingDynamicLogo');
        const telemetryDataStatusFeedbackStringLabel = document.getElementById('telemetryDataStatusFeedbackStringLabel');

        function switchAuthenticationGatewayViewMode() {
            stateViewGatewayRegistrationActiveMode = !stateViewGatewayRegistrationActiveMode;
            if (stateViewGatewayRegistrationActiveMode) {
                authGatewayMainHeadingTitleText.innerText = "Provision Core Profile";
                authGatewaySubHeadingText.innerText = "Allocate credentials inside the automated network directory.";
                formSubmitActionTriggerButton.innerText = "Register Profile Sequence";
                formFieldIdentityUsernameNode.classList.remove('hidden');
                formFieldIdentityUsernameNode.setAttribute('required', 'true');
                formActionToggleViewFooterWrapper.innerHTML = `Registered user token instance? <span onclick='switchAuthenticationGatewayViewMode()'>Authorize Security Token</span>`;
                
                formBrandingDynamicLogo.style.borderColor = "var(--accent-green)";
                formBrandingDynamicLogo.style.boxShadow = "0 0 35px rgba(0, 255, 136, 0.35)";
            } else {
                authGatewayMainHeadingTitleText.innerText = "Security Clearance Required";
                authGatewaySubHeadingText.innerText = "Establish link sequence to initialization node pipeline.";
                formSubmitActionTriggerButton.innerText = "Authorize Gateway Interface";
                formFieldIdentityUsernameNode.classList.add('hidden');
                formFieldIdentityUsernameNode.removeAttribute('required');
                formActionToggleViewFooterWrapper.innerHTML = `New instance pipeline structure? <span onclick='switchAuthenticationGatewayViewMode()'>Provision Account Profile</span>`;
                
                formBrandingDynamicLogo.style.borderColor = "var(--accent-cyan)";
                formBrandingDynamicLogo.style.boxShadow = "0 0 35px rgba(0, 168, 255, 0.35)";
            }
        }

        function handleAuthenticationGatewayFormProcessing(event) {
            event.preventDefault();

            appRootWindowFrameBox.style.transform = "scale(0.95)";
            appRootWindowFrameBox.style.opacity = "0";

            setTimeout(() => {
                authGatewayStructuralWrapper.style.display = "none";
                runtimeWorkspaceStructuralWrapper.style.display = "block";
                windowDisplayDynamicTitle.innerText = "Require Hub v6 // Execution Engine Workspace — Second Branch Official";
                appRootWindowFrameBox.style.transform = "scale(1)";
                appRootWindowFrameBox.style.opacity = "1";
                executeEditorCanvasLineNumbersRecalculation();
            }, 240);
        }

        function disconnectSystemRuntimePipelineEngine() {
            appRootWindowFrameBox.style.transform = "scale(0.95)";
            appRootWindowFrameBox.style.opacity = "0";

            setTimeout(() => {
                runtimeWorkspaceStructuralWrapper.style.display = "none";
                authGatewayStructuralWrapper.style.display = "flex";
                windowDisplayDynamicTitle.innerText = "Require Hub v6 // Connection Portal";
                appRootWindowFrameBox.style.transform = "scale(1)";
                appRootWindowFrameBox.style.opacity = "1";
                
                // Reset Inject Status
                isAttachedToRobloxInstanceEngine = false;
                telemetryDataStatusFeedbackStringLabel.innerText = "Ready to Attach";
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-cyan)";
            }, 240);
        }

        /* =========================================================================
           OPERATIONS SECTOR C: LIVE CODE TERMINAL & EXECUTION INTERFACE ENGINE
           ========================================================================= */
        function flushWorkspaceEditorTextAreaStream() {
            workspaceCodeTextAreaStreamSource.value = "";
            executeEditorCanvasLineNumbersRecalculation();
        }

        function executeEditorCanvasLineNumbersRecalculation() {
            const totalRowBreakStringsLength = workspaceCodeTextAreaStreamSource.value.split('\n').length;
            let counterIncrementalBlockMarkupStream = "";
            for (let lineNumberCursor = 1; lineNumberCursor <= totalRowBreakStringsLength; lineNumberCursor++) {
                counterIncrementalBlockMarkupStream += lineNumberCursor + "<br>";
            }
            editorLineCounterCanvasGutter.innerHTML = counterIncrementalBlockMarkupStream;
        }

        function attachToRobloxInstancePipeline() {
            if (isAttachedToRobloxInstanceEngine) {
                alert("Engine Notification: Thread pipeline already attached to active process.");
                return;
            }

            telemetryDataStatusFeedbackStringLabel.innerText = "Attaching DLL Link...";
            telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-yellow)";

            setTimeout(() => {
                isAttachedToRobloxInstanceEngine = true;
                telemetryDataStatusFeedbackStringLabel.innerText = "Attached to Roblox Process";
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-green)";
            }, 1200);
        }

        function fireCompiledScriptPayloadStream() {
            if (!isAttachedToRobloxInstanceEngine) {
                alert("Execution Error: You must Attach/Inject the executor into the process environment before compiled strings can run.");
                return;
            }

            if (workspaceCodeTextAreaStreamSource.value.trim() === "") {
                alert("Compilation failure: Main execution editor cache buffer is empty.");
                return;
            }
            
            telemetryDataStatusFeedbackStringLabel.innerText = "Running script payload thread...";
            telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-yellow)";

            setTimeout(() => {
                telemetryDataStatusFeedbackStringLabel.innerText = "Attached to Roblox Process";
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-green)";
                alert("Script Compiled. Payload injected directly into active Roblox Environment via pipeline.");
            }, 500);
        }

        // Window interaction scaling controls
        function closeApplicationContextFrame() {
            if(confirm("Terminate executor environment framework engine process?")) {
                appRootWindowFrameBox.style.opacity = "0";
                appRootWindowFrameBox.style.transform = "scale(0.82) translateY(45px)";
            }
        }

        function minimizeApplicationContextFrame() {
            appRootWindowFrameBox.style.transform = "translateY(800px) scale(0.35)";
            appRootWindowFrameBox.style.opacity = "0";
        }

        window.addEventListener('click', (surfaceClickEventTrackingContext) => {
            if(appRootWindowFrameBox.style.opacity === "0" && !authGatewayStructuralWrapper.contains(surfaceClickEventTrackingContext.target) && appRootWindowFrameBox.style.transform.includes("translateY(800px)")) {
                appRootWindowFrameBox.style.transform = "scale(1) translateY(0px)";
                appRootWindowFrameBox.style.opacity = "1";
            }
        });

        function maximizeApplicationContextFrame() {
            alert("Optimal layout scaling vector configurations already set up for desktop viewport mapping.");
        }
    </script>
</body>
</html>
