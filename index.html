<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Require Hub v6 — Custom Roblox Executor</title>
    <style>
        /* =========================================================================
           1. THEME ENGINE & DESIGN TOKENS (Black & Blue Theme)
           ========================================================================= */
        :root {
            --bg-dark-primary: #020204;
            --bg-dark-secondary: #05070f;
            --bg-glass-panel: rgba(6, 8, 14, 0.90);
            --bg-editor-canvas: #010205; /* True Dark Pitch Black Canvas */
            --accent-cyan: #00a8ff;
            --accent-cyan-hover: #3faeff;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --accent-yellow: #ffa502;
            --text-pure-white: #ffffff;
            --text-muted-gray: #5f7590;
            --font-stack-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-stack-code: 'Consolas', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack-main);
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark-primary);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dynamic Animated Background Mesh */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-vignette {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, rgba(0, 85, 255, 0.08) 0%, rgba(2, 2, 4, 0.98) 90%);
            z-index: 2;
            pointer-events: none;
        }

        /* =========================================================================
           2. EXECUTIVE CONTAINER FRAMEWORK (1100px Premium Layout)
           ========================================================================= */
        .app-window-shell {
            position: relative;
            z-index: 10;
            background: var(--bg-glass-panel);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(0, 168, 255, 0.2); 
            border-radius: 14px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.95), 0 0 70px rgba(0, 168, 255, 0.08);
            color: var(--text-pure-white);
            overflow: hidden;
            width: 1100px;  
            height: 680px;  
            display: flex;
            flex-direction: column;
        }

        /* Top Window Header Controls Bar */
        .window-topbar-container {
            background: rgba(4, 5, 10, 0.95);
            padding: 18px 26px;
            border-bottom: 1px solid rgba(0, 168, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar-identity-cluster {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .topbar-window-controls {
            display: flex;
            gap: 10px;
        }

        .window-control-circle {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            cursor: pointer;
        }
        .window-control-circle.close-proc { background: var(--accent-red); }
        .window-control-circle.min-proc { background: var(--accent-yellow); }
        .window-control-circle.max-proc { background: #27c93f; }

        /* =========================================================================
           3. PORTAL ACCESS SYSTEM (Login Viewport Frame)
           ========================================================================= */
        .auth-viewport-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 60px;
            text-align: center;
        }

        .auth-viewport-wrapper h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .auth-viewport-subtext {
            font-size: 0.9rem;
            color: var(--text-muted-gray);
            margin-bottom: 36px;
        }

        .auth-form-engine-module {
            width: 100%;
            max-width: 380px;
        }

        .form-input-node {
            width: 100%;
            padding: 14px 20px;
            background: rgba(1, 2, 5, 0.7);
            border: 1px solid rgba(0, 168, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 18px;
        }

        .form-input-node:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 14px rgba(0, 168, 255, 0.25);
        }

        .form-submit-trigger-node {
            width: 100%;
            padding: 14px;
            background: var(--accent-cyan);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .form-submit-trigger-node:hover {
            background: var(--accent-cyan-hover);
            box-shadow: 0 0 25px rgba(0, 168, 255, 0.45);
        }

        /* =========================================================================
           4. WORKSPACE MATRIX PLATFORM (Massive Dark Text Editor Canvas Window)
           ========================================================================= */
        .runtime-viewport-wrapper {
            display: none; /* Safely hides workspace until user hits 'Authorize' button */
            flex-grow: 1;
            height: calc(100% - 65px);
        }

        .workspace-terminal-panel {
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: #010204;
        }

        .workspace-editor-canvas-box {
            flex-grow: 1; /* Forces code engine box to expand completely vertically */
            background: var(--bg-editor-canvas);
            border: 1px solid rgba(0, 168, 255, 0.15);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            gap: 18px;
            overflow: hidden;
            position: relative;
        }

        .editor-line-number-gutter {
            text-align: right;
            font-family: var(--font-stack-code);
            font-size: 1.05rem; 
            color: #1e2d42;     
            line-height: 1.6;
            user-select: none;
        }

        #workspaceCodeTextAreaStreamSource {
            flex-grow: 1; /* Forces coding layout engine box to stretch fully wide */
            background: transparent;
            border: none;
            outline: none;
            color: var(--accent-cyan); /* High contrast electric blue font coding text */
            font-family: var(--font-stack-code);
            font-size: 1.05rem; 
            resize: none;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
            overflow-y: auto;
        }

        /* Interface Control Console Bar Footer Alignment Row */
        .workspace-operations-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .operations-action-cluster-nodes {
            display: flex;
            gap: 14px;
        }

        .operation-execution-button {
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid rgba(0, 168, 255, 0.2);
            background: rgba(255, 255, 255, 0.01);
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .operation-execution-button:hover {
            background: rgba(0, 168, 255, 0.05);
            border-color: rgba(0, 168, 255, 0.35);
        }

        .operation-execution-button.primary-payload-fire {
            background: var(--accent-cyan);
            color: #ffffff;
            border: none;
        }

        .operation-execution-button.primary-payload-fire:hover {
            background: var(--accent-cyan-hover);
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.45);
        }

        /* NEON HIGHLIGHT COLOR SPECIFICALLY ROUTED FOR THE DYNAMIC INJECTION ACTION */
        .operation-execution-button.user-injection-trigger {
            border-color: rgba(0, 255, 136, 0.4);
            color: var(--accent-green);
        }
        .operation-execution-button.user-injection-trigger:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .telemetry-stream-pipeline-status-text {
            font-size: 0.8rem;
            color: var(--text-muted-gray);
            font-family: var(--font-stack-code);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .telemetry-stream-pipeline-status-text span {
            color: var(--accent-cyan);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- VISUAL BACKGROUND PRESENTATION GRID LAYERS -->
    <canvas id="bgCanvas"></canvas>
    <div class="ambient-vignette"></div>

    <!-- MAIN APP WINDOW BOUNDARY LAYER -->
    <div class="app-window-shell" id="appRootWindowFrameBox">
        
        <!-- ROW HEADER CONTROLLER FRAME -->
        <div class="window-topbar-container">
            <div class="topbar-identity-cluster">
                <span id="windowDisplayDynamicTitle">Require Hub v6 // Connection Portal</span>
            </div>
            <div class="topbar-window-controls">
                <div class="window-control-circle close-proc" onclick="closeApp()"></div>
                <div class="window-control-circle min-proc" onclick="minimizeApp()"></div>
                <div class="window-control-circle max-proc" onclick="maximizeApp()"></div>
            </div>
        </div>

        <!-- STAGE PORTAL VIEWPORT 1: PRE-AUTHENTICATION SECURITY LAYER -->
        <div class="auth-viewport-wrapper" id="authGatewayStructuralWrapper">
            <h2>Security Clearance Required</h2>
            <p class="auth-viewport-subtext">Establish link sequence to initialization node pipeline.</p>
            
            <form class="auth-form-engine-module" onsubmit="handleAuthBypassSequence(event)">
                <input type="email" class="form-input-node" placeholder="System Registry Identifier Email" required>
                <input type="password" class="form-input-node" placeholder="Security Access Encryption Token" required>
                <button type="submit" class="form-submit-trigger-node">Authorize Gateway Interface</button>
            </form>
        </div>

        <!-- STAGE PORTAL VIEWPORT 2: THE COMPILER INTERFACE (MASSIVE WORKSPACE AREA) -->
        <div class="runtime-viewport-wrapper" id="runtimeWorkspaceStructuralWrapper">
            <div class="workspace-terminal-panel">
                <div class="workspace-editor-canvas-box">
                    
                    <!-- Dynamic Line Index Numbers Gutter Tracking Stream Column -->
                    <div class="editor-line-number-gutter" id="editorLineCounterCanvasGutter">1<br>2<br>3<br>4<br>5</div>
                    
                    <!-- Main Text-Area Engine Container Canvas Slot -->
                    <textarea id="workspaceCodeTextAreaStreamSource" spellcheck="false" oninput="executeEditorCanvasLineNumbersRecalculation()">-- Require Hub v6 Official Roblox Executor Script Playground&#10;print("Executor Environment Loaded Successfully.")&#10;local Player = game:GetService("Players").LocalPlayer&#10;&#10;-- Paste or write your custom Roblox scripts below...</textarea>
                </div>

                <!-- Lower Layout Operations Control Bar Row Component Elements -->
                <div class="workspace-operations-row">
                    <div class="operations-action-cluster-nodes">
                        <button class="operation-execution-button primary-payload-fire" onclick="fireCompiledScriptPayloadStream()">Execute</button>
                        <button class="operation-execution-button" onclick="flushWorkspaceEditorTextAreaStream()">Clear Canvas</button>
                        <button class="operation-execution-button" onclick="attachToRobloxInstancePipeline()">Attach / Inject</button>
                        
                        <!-- ADD ROBLOX USER TARGET SPECIFIC INJECTION ROUTING BUTTON PANEL COMPONENT -->
                        <button class="operation-execution-button user-injection-trigger" onclick="addRobloxUserAndInjectPipeline()">Add Roblox User</button>
                    </div>
                    <div class="telemetry-stream-pipeline-status-text">Engine Connection State: <span id="telemetryDataStatusFeedbackStringLabel">Ready to Attach</span></div>
                </div>
            </div>
        </div>

    </div>

    <!-- =========================================================================
       5. JAVASCRIPT EXECUTOR COMPILER PROGRAM ENGINE RUNTIME PIPELINES
       ========================================================================= */ -->
    <script>
        /* INTERPOLATIVE MATRIX PARTICLE BACKGROUND SCRIPT CODE ENGINE */
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let layoutWidthVector = canvas.width = window.innerWidth;
        let layoutHeightVector = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            layoutWidthVector = canvas.width = window.innerWidth;
            layoutHeightVector = canvas.height = window.innerHeight;
        });

        const activeCoordinatesNodeCluster = [];
        const networkCalculationDensityLimit = 125;

        for (let idx = 0; idx < networkCalculationDensityLimit; idx++) {
            activeCoordinatesNodeCluster.push({
                spatialX: Math.random() * layoutWidthVector,
                spatialY: Math.random() * layoutHeightVector,
                speedX: (Math.random() - 0.5) * 1.4,
                speedY: (Math.random() - 0.5) * 1.4,
                coordinateRadius: Math.random() * 2 + 1
            });
        }

        function systemBackgroundGraphicFrameLoopEngine() {
            ctx.clearRect(0, 0, layoutWidthVector, layoutHeightVector);
            ctx.fillStyle = "rgba(0, 168, 255, 0.4)";

            for (let cursorIdx = 0; cursorIdx < activeCoordinatesNodeCluster.length; cursorIdx++) {
                let movingNode = activeCoordinatesNodeCluster[cursorIdx];
                movingNode.spatialX += movingNode.speedX;
                movingNode.spatialY += movingNode.speedY;

                if (movingNode.spatialX < 0 || movingNode.spatialX > layoutWidthVector) movingNode.speedX *= -1;
                if (movingNode.spatialY < 0 || movingNode.spatialY > layoutHeightVector) movingNode.speedY *= -1;

                ctx.beginPath();
                ctx.arc(movingNode.spatialX, movingNode.spatialY, movingNode.coordinateRadius, 0, Math.PI * 2);
                ctx.fill();

                for (let relationalCursorIdx = cursorIdx + 1; relationalCursorIdx < activeCoordinatesNodeCluster.length; relationalCursorIdx++) {
                    let benchmarkNode = activeCoordinatesNodeCluster[relationalCursorIdx];
                    let absoluteDistanceHypot = Math.hypot(movingNode.spatialX - benchmarkNode.spatialX, movingNode.spatialY - benchmarkNode.spatialY);

                    if (absoluteDistanceHypot < 140) {
                        ctx.strokeStyle = `rgba(0, 140, 255, ${1 - (absoluteDistanceHypot / 140) * 0.95})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(movingNode.spatialX, movingNode.spatialY);
                        ctx.lineTo(benchmarkNode.spatialX, benchmarkNode.spatialY);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(systemBackgroundGraphicFrameLoopEngine);
        }
        systemBackgroundGraphicFrameLoopEngine();

        /* OPERATIONS CONTROL FUNCTIONS LOGICAL CONTROLLERS */
        let isAttachedToRobloxInstanceEngine = false;
        let dynamicTargetRobloxUserToken = "";

        const authGatewayStructuralWrapper = document.getElementById('authGatewayStructuralWrapper');
        const runtimeWorkspaceStructuralWrapper = document.getElementById('runtimeWorkspaceStructuralWrapper');
        const appRootWindowFrameBox = document.getElementById('appRootWindowFrameBox');
        const windowDisplayDynamicTitle = document.getElementById('windowDisplayDynamicTitle');
        const workspaceCodeTextAreaStreamSource = document.getElementById('workspaceCodeTextAreaStreamSource');
        const editorLineCounterCanvasGutter = document.getElementById('editorLineCounterCanvasGutter');
        const telemetryDataStatusFeedbackStringLabel = document.getElementById('telemetryDataStatusFeedbackStringLabel');

        function handleAuthBypassSequence(event) {
            event.preventDefault();
            appRootWindowFrameBox.style.transform = "scale(0.95)";
            appRootWindowFrameBox.style.opacity = "0";

            setTimeout(() => {
                authGatewayStructuralWrapper.style.display = "none";
                runtimeWorkspaceStructuralWrapper.style.display = "block";
                windowDisplayDynamicTitle.innerText = "Require Hub v6 // Execution Engine Workspace — Dedicated Executor Pipeline";
                appRootWindowFrameBox.style.transform = "scale(1)";
                appRootWindowFrameBox.style.opacity = "1";
                executeEditorCanvasLineNumbersRecalculation();
            }, 240);
        }

        function executeEditorCanvasLineNumbersRecalculation() {
            const totalRowBreakStringsLength = workspaceCodeTextAreaStreamSource.value.split('\n').length;
            let counterIncrementalBlockMarkupStream = "";
            for (let lineNumberCursor = 1; lineNumberCursor <= totalRowBreakStringsLength; lineNumberCursor++) {
                counterIncrementalBlockMarkupStream += lineNumberCursor + "<br>";
            }
            editorLineCounterCanvasGutter.innerHTML = counterIncrementalBlockMarkupStream;
        }

        function flushWorkspaceEditorTextAreaStream() {
            workspaceCodeTextAreaStreamSource.value = "";
            executeEditorCanvasLineNumbersRecalculation();
        }

        function attachToRobloxInstancePipeline() {
            if (isAttachedToRobloxInstanceEngine) {
                alert("Engine Notification: Thread pipeline already attached to active process.");
                return;
            }
            telemetryDataStatusFeedbackStringLabel.innerText = "Attaching DLL Link...";
            telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-yellow)";

            setTimeout(() => {
                isAttachedToRobloxInstanceEngine = true;
                telemetryDataStatusFeedbackStringLabel.innerText = "Attached to Global Process";
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-green)";
            }, 1200);
        }

        /* TARGETED SYSTEM USER DATA INJECTION HANDLING TRIGGER */
        function addRobloxUserAndInjectPipeline() {
            const requestedUserHandle = prompt("Enter the exact Roblox Username to bind and hook injection pipeline threads to:");
            
            if (!requestedUserHandle || requestedUserHandle.trim() === "") {
                alert("Injection Cancelled: Valid Roblox target handle signature required.");
                return;
            }

            dynamicTargetRobloxUserToken = requestedUserHandle.trim();
            telemetryDataStatusFeedbackStringLabel.innerText = `Injecting into User: [${dynamicTargetRobloxUserToken}]...`;
            telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-yellow)";

            setTimeout(() => {
                isAttachedToRobloxInstanceEngine = true;
                telemetryDataStatusFeedbackStringLabel.innerText = `Hooked to User: ${dynamicTargetRobloxUserToken}`;
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-green)";
                alert(`Pipeline Successfully Routed! Memory hooks attached specifically to target context client process tracking identity user: "${dynamicTargetRobloxUserToken}". All script prints will deploy within this runtime block container.`);
            }, 1000);
        }

        function fireCompiledScriptPayloadStream() {
            if (!isAttachedToRobloxInstanceEngine) {
                alert("Execution Error: You must Attach/Inject or use 'Add Roblox User' to hook the executor instance into an active game process before scripts can run.");
                return;
            }

            if (workspaceCodeTextAreaStreamSource.value.trim() === "") {
                alert("Compilation failure: Main execution editor cache buffer is empty.");
                return;
            }
            
            const operationalLabelBackupState = telemetryDataStatusFeedbackStringLabel.innerText;
            telemetryDataStatusFeedbackStringLabel.innerText = "Running script payload thread...";
            telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-yellow)";

            setTimeout(() => {
                telemetryDataStatusFeedbackStringLabel.innerText = operationalLabelBackupState;
                telemetryDataStatusFeedbackStringLabel.style.color = "var(--accent-green)";
                
                const scopeExecutionTargetContext = dynamicTargetRobloxUserToken ? `Target Active Identity Client: ${dynamicTargetRobloxUserToken}` : "Global Process Client Thread Space";
                alert(`Script Compiled successfully!\n\nContext Target Layer: [${scopeExecutionTargetContext}]\nPayload bytecode stream fully deployed through active interface pipelines.`);
            }, 500);
        }

        /* DESKTOP WINDOW INTERFACE MANAGEMENT CORE METHODS */
        function closeApp() {
            if(confirm("Terminate executor environment framework engine process?")) {
                appRootWindowFrameBox.style.opacity = "0";
                appRootWindowFrameBox.style.transform = "scale(0.82) translateY(45px)";
            }
        }

        function minimizeApp() {
            appRootWindowFrameBox.style.transform = "translateY(800px) scale(0.35)";
            appRootWindowFrameBox.style.opacity = "0";
        }

        window.addEventListener('click', (surfaceClickEventTrackingContext) => {
            if(appRootWindowFrameBox.style.opacity === "0" && appRootWindowFrameBox.style.transform.includes("translateY(800px)")) {
                appRootWindowFrameBox.style.transform = "scale(1) translateY(0px)";
                appRootWindowFrameBox.style.opacity = "1";
            }
        });

        function maximizeApp() {
            alert("Optimal scaling vector limits already met for active display boundaries.");
        }
    </script>
</body>
</html>
